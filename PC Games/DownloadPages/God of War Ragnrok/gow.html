<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.cdnfonts.com/css/ps" rel="stylesheet">
    <style>
        body {
            font-family: 'PS', sans-serif;  
            margin: 0; /* Remove default body margin */
            padding: 0; /* Remove default body padding */
            background-color: black;
        }

        .container {
            display: flex;
        }

        .wrap {
            background-color: rgb(0, 0, 0);
            flex: 1; /* Take remaining space */
            padding: 20px; /* Add padding for better appearance */
        }

        .downwrap article {
            margin-top: 190px;
            margin-left: 60px;
            background-color: rgb(70, 69, 69);
            color: white;
            border: 1px solid black;
            border-radius: 10px;
            padding-left: 80px;
            padding-right: 80px;
        }

        .Downloadbutton {
            border: 2px solid rgb(255, 255, 255);
            padding: 10px;
            text-align: center;
            border-bottom-right-radius: 20px;
        }

        a {
            text-decoration: none;
        }

        .info {
            /* Add padding for better appearance */
            background-color: rgb(0, 0, 0);
            color: white;
            font-size: 14px;
        }

        .gow {
            padding-top: 10px;
            width: 1000px;
            height: 400px;
            
            
            
        }
        .ginfo {
            padding-left: 60px;
        }
        .moreinfo {
            background-color: black;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="wrap">
            <table class="downwrap">
                <tr>
                    <td>
                        <section>
                            <article>
                                <h2>God Of War: Ragnarok</h2><br>
                                <h6>Santa Monica Studio</h6><br>
                                <a href="#"><p class="Downloadbutton">Download</p></a><br>
                            </article>
                        </section>
                    </td>
                </tr>
            </table>
        </div>

        <div class="info">
            <table>
                <tr>
                    <td>
                        <img src="../photo/god of war.png" alt="God of War" width="480" height="270" class="gow">
                    </td>
                </tr>
            </table>
            <table>
                <tr>
                    <td>
                        <p>Offline Play Enabled</p>
                    </td>
                    <td class="ginfo">
                        <p>Single Player</p>
                    </td>
                    <td class="ginfo">
                        <p>RemotePlay Support</p>
                    </td>
                </tr>
                <tr>
                    <td>
                        <p>PC Version</p>
                    </td>
                    <td class="ginfo">
                        <p>Vibration function and trigger effect supported (DualSense wireless controller)</p>
                    </td>
                    <td class="ginfo">
                        <p>Blood, Language, Mild Suggestive Themes, Use of Alcohol and Tobacco, Violence</p>
                    </td>
                </tr>
            </table>
            
           
        </div>
    </div>
    
        <p>haha</p>
    
</body>
</html>
