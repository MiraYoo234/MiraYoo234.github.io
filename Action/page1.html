        .top-nav {

            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 1000;
            display: flex;

        }

        .content {

        /* Optional: Add some styles for better visibility */
        a {

        }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
        }
