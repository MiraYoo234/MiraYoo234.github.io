<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping List</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
    }

    header {
      background-color: #333;
      color: #fff;
      text-align: center;
      padding: 1em;
    }

    #shopping-list {
      max-width: 600px;
      margin: 20px auto;
      background-color: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    #item-input {
      width: 70%;
      padding: 8px;
      margin-right: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }

    #add-btn {
      padding: 8px;
      background-color: #4caf50;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    ul {
      list-style-type: none;
      padding: 0;
    }

    li {
      margin: 10px 0;
      padding: 10px;
      background-color: #f9f9f9;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .delete-btn {
      background-color: #e74c3c;
      color: #fff;
      border: none;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <header>
    <h1>Shopping List</h1>
  </header>

  <div id="shopping-list">
    <div>
      <input type="text" id="item-input" placeholder="Add an item">
      <button id="add-btn" onclick="addItem()">Add</button>
    </div>

    <ul id="items-list">
      <!-- Items will be dynamically added here -->
    </ul>
  </div>

  <script>
    function addItem() {
      var itemInput = document.getElementById('item-input');
      var itemName = itemInput.value.trim();

      if (itemName !== '') {
        var itemsList = document.getElementById('items-list');
        var newItem = document.createElement('li');
        newItem.innerHTML = `
          <span>${itemName}</span>
          <button class="delete-btn" onclick="deleteItem(this)">Delete</button>
        `;
        itemsList.appendChild(newItem);
        itemInput.value = '';
      }
    }

    function deleteItem(btn) {
      var listItem = btn.closest('li');
      listItem.remove();
    }
  </script>

</body>
</html>
